rules:
  - id: captro-swift-token-userdefaults
    message: Store auth/session tokens in Keychain, not UserDefaults.
    severity: ERROR
    languages: [swift]
    pattern-either:
      - pattern: UserDefaults.standard.set($VALUE, forKey: $KEY)
      - pattern: UserDefaults.standard.setValue($VALUE, forKey: $KEY)
    metavariable-regex:
      metavariable: $KEY
      regex: (?i).*(token|session|auth|password|secret|credential).*

  - id: captro-swift-insecure-url-literal
    message: Captro iOS code should not call insecure HTTP endpoints outside DEBUG localhost flows.
    severity: ERROR
    languages: [swift]
    pattern: URL(string: $URL)
    metavariable-regex:
      metavariable: $URL
      regex: '"http://(?!localhost|127\.0\.0\.1|\[::1\]).*'

  - id: captro-worker-sensitive-console-log
    message: Do not log sensitive auth, token, secret, password, cookie, or private message data.
    severity: ERROR
    languages: [typescript, javascript]
    pattern-either:
      - pattern: console.log($X)
      - pattern: console.warn($X)
      - pattern: console.error($X)
    metavariable-regex:
      metavariable: $X
      regex: (?i).*(token|authorization|password|secret|cookie|private.?message|message_content).*

  - id: captro-worker-raw-sql-template
    message: Do not interpolate user-controlled values into SQL. Use D1 prepared statements and bind parameters.
    severity: WARNING
    languages: [typescript, javascript]
    pattern-either:
      - pattern: $DB.prepare(`...${$VALUE}...`)
      - pattern: $DB.exec(`...${$VALUE}...`)

  - id: captro-worker-math-random-security
    message: Do not use Math.random for IDs, tokens, request keys, or security-sensitive values. Use crypto.randomUUID or crypto.getRandomValues.
    severity: WARNING
    languages: [typescript, javascript]
    pattern: Math.random()
