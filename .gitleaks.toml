title = "Captro Gitleaks Configuration"

[extend]
useDefault = true

[allowlist]
description = "Documented placeholders and public identifiers"
regexes = [
  '''replace-with-strong-secret''',
  '''AIza[0-9A-Za-z_\-]{20,}''',
  '''702354172189-[0-9a-z]+\.apps\.googleusercontent\.com''',
  '''2ca88b3551321681a5f9434814f38ec8''',
  '''DY-IgVdOm-0zb0K5ZFnpKA'''
]
paths = [
  '''^backend-cf/\.env\.example$''',
  '''^SECURITY_AUDIT_PLAN\.md$''',
  '''^SECURITY_OPERATIONS\.md$'''
]
