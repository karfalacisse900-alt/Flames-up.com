name: Admin Web CI

on:
  pull_request:
    branches: [main]
    paths:
      - "admin-web/**"
      - ".github/workflows/admin-web-ci.yml"
  push:
    branches: [main]
    paths:
      - "admin-web/**"
      - ".github/workflows/admin-web-ci.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Install dependencies
        working-directory: ./admin-web
        run: npm ci

      - name: Type-check and build
        working-directory: ./admin-web
        run: npm run build
