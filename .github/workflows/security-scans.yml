name: Security Scans

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "backend-cf/**"
      - "frontend/**"
      - "governance-mobile/**"
      - "ios_native/MIRA/**"
      - ".github/workflows/security-scans.yml"
      - ".semgrep.yml"
      - ".gitleaks.toml"
  schedule:
    - cron: "27 8 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run Gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose

  semgrep:
    name: Static security rules (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/secrets \
            --config p/owasp-top-ten \
            --config .semgrep.yml \
            --sarif \
            --output semgrep.sarif \
            --exclude '**/node_modules/**' \
            --exclude '**/.wrangler/**' \
            --exclude '**/target/**'

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            os: ubuntu-latest
            build-mode: none
          - language: swift
            os: macos-26
            build-mode: manual

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect supported source tree
        id: detect-source
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.language }}" != "swift" || -f "ios_native/MIRA/project.yml" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Swift CodeQL skipped because ios_native/MIRA is not present on this branch."
          fi

      - name: Initialize CodeQL
        if: steps.detect-source.outputs.enabled == 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build Swift app for CodeQL
        if: matrix.language == 'swift' && steps.detect-source.outputs.enabled == 'true'
        working-directory: ios_native/MIRA
        run: |
          set -euo pipefail
          brew install xcodegen
          xcodegen generate --spec project.yml
          xcodebuild \
            -project MIRA.xcodeproj \
            -scheme MIRA \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Analyze
        if: steps.detect-source.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
