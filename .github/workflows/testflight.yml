name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: Notes shown in the GitHub Actions run
        required: false
        type: string
  push:
    tags:
      - "testflight-*"

permissions:
  contents: read

concurrency:
  group: ios-testflight
  cancel-in-progress: false

env:
  IOS_PROJECT_DIR: ios_native/MIRA
  XCODE_PROJECT: MIRA.xcodeproj
  SCHEME: MIRA
  CONFIGURATION: Release
  BUNDLE_IDENTIFIER: com.karfala90.frontend

jobs:
  upload:
    name: Archive and Upload
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode_26.5.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.0.app/Contents/Developer
          elif [ -d "/Applications/Xcode_26.4.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer
          elif [ -d "/Applications/Xcode_26.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
          elif [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          set -euo pipefail
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Validate release secrets
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          for name in \
            APP_STORE_CONNECT_API_KEY_ID \
            APP_STORE_CONNECT_API_ISSUER_ID \
            APP_STORE_CONNECT_API_KEY_BASE64 \
            APPLE_TEAM_ID \
            IOS_DISTRIBUTION_CERTIFICATE_BASE64 \
            IOS_DISTRIBUTION_CERTIFICATE_PASSWORD \
            IOS_PROVISIONING_PROFILE_BASE64 \
            KEYCHAIN_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: $name"
              exit 1
            fi
          done

      - name: Install App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/appstore_keys"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 -D > "$RUNNER_TEMP/appstore_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/appstore_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          echo "API_PRIVATE_KEYS_DIR=$RUNNER_TEMP/appstore_keys" >> "$GITHUB_ENV"

      - name: Install signing certificate and provisioning profile
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/ios_distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/ios_profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/ios_profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
          PROFILE_NAME="${IOS_PROVISIONING_PROFILE_NAME:-$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")}"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"

      - name: Generate Xcode project
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          set -euo pipefail
          xcodegen generate

      - name: Archive app
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          set -euo pipefail
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/MIRA.xcarchive" \
            clean archive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Create export options
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          set -euo pipefail
          cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_IDENTIFIER</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$PWD/build/MIRA.xcarchive" \
            -exportPath "$PWD/build/export" \
            -exportOptionsPlist "$PWD/build/ExportOptions.plist"

      - name: Upload to TestFlight
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          IPA_PATH="$(find "$PWD/build/export" -type f -name "*.ipa" -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA was exported."
            exit 1
          fi
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mira-ios-testflight-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            ${{ env.IOS_PROJECT_DIR }}/build/export/*.ipa
            ${{ env.IOS_PROJECT_DIR }}/build/*.xcarchive
          if-no-files-found: ignore
