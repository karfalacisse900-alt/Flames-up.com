name: Deploy Flames-Up API

on:
  push:
    branches: [main]
    paths: ["backend-cf/**", ".github/workflows/deploy-worker.yml"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend-cf/package-lock.json

      - name: Install dependencies
        working-directory: ./backend-cf
        run: npm ci

      - name: Type-check backend-cf
        working-directory: ./backend-cf
        run: npx tsc --noEmit

      - name: Deploy to Cloudflare Workers
        working-directory: ./backend-cf
        run: npx wrangler deploy --env production --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
