name: Deploy Flames-Up API

on:
  push:
    branches: [main]
    paths: ["backend-cf/**", ".github/workflows/deploy-worker.yml"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend-cf/package-lock.json

      - name: Install dependencies
        working-directory: ./backend-cf
        run: npm ci

      - name: Type-check backend-cf
        working-directory: ./backend-cf
        run: npx tsc --noEmit

      - name: Sync Cloudflare media runtime secrets
        working-directory: ./backend-cf
        shell: bash
        run: |
          set -euo pipefail
          IMAGES_TOKEN="${CLOUDFLARE_IMAGES_TOKEN:-${CLOUDFLARE_MEDIA_API_TOKEN:-$CLOUDFLARE_API_TOKEN}}"
          STREAM_TOKEN="${CLOUDFLARE_STREAM_TOKEN:-${CLOUDFLARE_MEDIA_API_TOKEN:-$CLOUDFLARE_API_TOKEN}}"
          if [ -z "$IMAGES_TOKEN" ] || [ -z "$STREAM_TOKEN" ]; then
            echo "Cloudflare media token is not configured."
            exit 1
          fi
          printf '%s' "$IMAGES_TOKEN" | npx wrangler secret put CLOUDFLARE_IMAGES_TOKEN --env production
          printf '%s' "$STREAM_TOKEN" | npx wrangler secret put CLOUDFLARE_STREAM_TOKEN --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_MEDIA_API_TOKEN: ${{ secrets.CLOUDFLARE_MEDIA_API_TOKEN }}
          CLOUDFLARE_IMAGES_TOKEN: ${{ secrets.CLOUDFLARE_IMAGES_TOKEN }}
          CLOUDFLARE_STREAM_TOKEN: ${{ secrets.CLOUDFLARE_STREAM_TOKEN }}

      - name: Sync Mapbox runtime secret
        working-directory: ./backend-cf
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${MAPBOX_ACCESS_TOKEN:-}" ]; then
            echo "MAPBOX_ACCESS_TOKEN is not configured; broad city/country labels will be unavailable."
            exit 0
          fi
          printf '%s' "$MAPBOX_ACCESS_TOKEN" | npx wrangler secret put MAPBOX_ACCESS_TOKEN --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}

      - name: Ensure media moderation queue exists
        working-directory: ./backend-cf
        run: npx wrangler queues create captro-media-moderation || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply production performance indexes
        working-directory: ./backend-cf
        run: npx wrangler d1 execute DB --env production --remote --yes --file=./migrations/0019_production_performance_indexes.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply production readiness schema
        working-directory: ./backend-cf
        run: npx wrangler d1 execute DB --env production --remote --yes --file=./migrations/0020_production_readiness.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply admin moderation schema
        working-directory: ./backend-cf
        run: npx wrangler d1 execute DB --env production --remote --yes --file=./migrations/0021_admin_moderation.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply Discover auto category schema
        working-directory: ./backend-cf
        run: npx wrangler d1 execute DB --env production --remote --yes --file=./migrations/0022_discover_auto_category.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply location system schema
        working-directory: ./backend-cf
        run: npx wrangler d1 execute DB --env production --remote --yes --file=./migrations/0023_location_system.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply pre-publish media moderation schema
        working-directory: ./backend-cf
        run: npx wrangler d1 execute DB --env production --remote --yes --file=./migrations/0024_pre_publish_media_moderation.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Enforce unique post likes
        working-directory: ./backend-cf
        run: npx wrangler d1 execute DB --env production --remote --yes --file=./migrations/0025_enforce_unique_likes.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Harden like uniqueness and repair counters
        working-directory: ./backend-cf
        run: npx wrangler d1 execute DB --env production --remote --yes --file=./migrations/0026_harden_like_uniqueness.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Canonicalize engagement counters
        working-directory: ./backend-cf
        run: npx wrangler d1 execute DB --env production --remote --yes --file=./migrations/0029_canonical_engagement_counts.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Merge legacy Discover likes
        working-directory: ./backend-cf
        run: npx wrangler d1 execute DB --env production --remote --yes --file=./migrations/0030_merge_legacy_discover_likes.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        working-directory: ./backend-cf
        run: npx wrangler deploy --env production --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
