name: Deploy Captro API

on:
  push:
    branches: [main]
    paths: ["backend-cf/**", "supabase/**", ".github/workflows/deploy-worker.yml"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend-cf/package-lock.json

      - name: Install dependencies
        working-directory: ./backend-cf
        run: npm ci

      - name: Type-check backend-cf
        working-directory: ./backend-cf
        run: npx tsc --noEmit

      - name: Check required Supabase production secrets
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "SUPABASE_ACCESS_TOKEN is required because Supabase Postgres is Captro's production database."
            exit 1
          fi
          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "SUPABASE_PROJECT_REF is required because Supabase Postgres is Captro's production database."
            exit 1
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "SUPABASE_SERVICE_ROLE_KEY is required as a Cloudflare Worker secret for server-side database writes."
            exit 1
          fi

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push Supabase Postgres migrations
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push

      - name: Sync Supabase service-role Worker secret
        working-directory: ./backend-cf
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Sync Cloudflare media runtime secrets
        working-directory: ./backend-cf
        shell: bash
        run: |
          set -euo pipefail
          IMAGES_TOKEN="${CLOUDFLARE_IMAGES_TOKEN:-${CLOUDFLARE_MEDIA_API_TOKEN:-$CLOUDFLARE_API_TOKEN}}"
          STREAM_TOKEN="${CLOUDFLARE_STREAM_TOKEN:-${CLOUDFLARE_MEDIA_API_TOKEN:-$CLOUDFLARE_API_TOKEN}}"
          if [ -z "$IMAGES_TOKEN" ] || [ -z "$STREAM_TOKEN" ]; then
            echo "Cloudflare media token is not configured."
            exit 1
          fi
          printf '%s' "$IMAGES_TOKEN" | npx wrangler secret put CLOUDFLARE_IMAGES_TOKEN --env production
          printf '%s' "$STREAM_TOKEN" | npx wrangler secret put CLOUDFLARE_STREAM_TOKEN --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_MEDIA_API_TOKEN: ${{ secrets.CLOUDFLARE_MEDIA_API_TOKEN }}
          CLOUDFLARE_IMAGES_TOKEN: ${{ secrets.CLOUDFLARE_IMAGES_TOKEN }}
          CLOUDFLARE_STREAM_TOKEN: ${{ secrets.CLOUDFLARE_STREAM_TOKEN }}

      - name: Sync Mapbox runtime secret
        working-directory: ./backend-cf
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${MAPBOX_ACCESS_TOKEN:-}" ]; then
            echo "MAPBOX_ACCESS_TOKEN is not configured; broad city/country labels will be unavailable."
            exit 0
          fi
          printf '%s' "$MAPBOX_ACCESS_TOKEN" | npx wrangler secret put MAPBOX_ACCESS_TOKEN --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}

      - name: Ensure media moderation queue exists
        working-directory: ./backend-cf
        run: npx wrangler queues create captro-media-moderation || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Skip legacy D1 migrations
        run: echo "Supabase Postgres is Captro's production database; D1 migrations are legacy-only and are not replayed during normal deploys."

      - name: Deploy to Cloudflare Workers
        working-directory: ./backend-cf
        run: npx wrangler deploy --env production --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
