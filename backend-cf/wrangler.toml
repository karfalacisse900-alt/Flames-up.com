name = "flames-up-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
JWT_SECRET = "REPLACE_WITH_YOUR_JWT_SECRET"
CLOUDFLARE_ACCOUNT_ID = "REPLACE_WITH_YOUR_ACCOUNT_ID"
CLOUDFLARE_IMAGES_TOKEN = "REPLACE_WITH_YOUR_CF_TOKEN"
CLOUDFLARE_STREAM_TOKEN = "REPLACE_WITH_YOUR_CF_TOKEN"
GOOGLE_MAPS_API_KEY = ""
FRONTEND_URL = "https://flames-up.com"

[[d1_databases]]
binding = "DB"
database_name = "flames-up-db"
database_id = "<YOUR_D1_DATABASE_ID>"

[[kv_namespaces]]
binding = "KV"
id = "<YOUR_KV_NAMESPACE_ID>"

[env.production]
name = "flames-up-api"

[env.production.vars]
JWT_SECRET = ""
FRONTEND_URL = "https://flames-up.com"
